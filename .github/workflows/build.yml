name: Build LingoStream APK
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Create Temporary Clean App
        run: |
          cd ..
          flutter create --org com.portallcomua --project-name=lingostream clean_app
          cp -r $GITHUB_WORKSPACE/lib/* clean_app/lib/
          cp $GITHUB_WORKSPACE/pubspec.yaml clean_app/pubspec.yaml
          cd clean_app
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/app-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoStream-Android-App
          path: app-release.apk
