name: Build LingoStream APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms=android --org com.uaserver .

      - name: Force Android SDK 36
        run: |
          echo "Before:"
          cat android/app/build.gradle.kts || true

          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle.kts")
          text = path.read_text()

          text = text.replace("compileSdk = flutter.compileSdkVersion", "compileSdk = 36")
          text = text.replace("targetSdk = flutter.targetSdkVersion", "targetSdk = 36")

          path.write_text(text)
          PY

          echo "After:"
          cat android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoStream-APK
          path: build/app/outputs/flutter-apk/app-release.apk
