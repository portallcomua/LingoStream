name: DeepSeek Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: DeepSeek Code Review
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.DEEPSEEK_API_KEY }}
          model: "deepseek-v4-flash"
          sys-prompt: "Ти — експерт з код-рев'ю. Аналізуй зміни в коді та давай конструктивні поради українською мовою."
